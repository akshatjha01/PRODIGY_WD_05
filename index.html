<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Forecast Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1>🌦 Weather Forecast Pro</h1>

<div class="search-box">

<input
type="text"
id="city"
placeholder="Enter City Name">

<button onclick="getWeather()">
🔍 Search
</button>

</div>

<button class="location-btn" onclick="getLocation()">
📍 Use My Location
</button>

<!-- Current Weather -->

<div id="currentWeather" class="card">

<h2>Current Weather</h2>

<div id="weatherIcon"></div>

<h1 id="temperature">--°C</h1>

<p id="condition">Weather Condition</p>

<p id="humidity"></p>

<p id="wind"></p>

<p id="visibility"></p>

<p id="sunrise"></p>

<p id="sunset"></p>

</div>

<!-- Extra Weather Details -->

<div class="extra-details">

<div class="detail-card">
<h3>🌡 Feels Like</h3>
<p id="feelsLike">--°C</p>
</div>

<div class="detail-card">
<h3>💧 Humidity</h3>
<p id="humidity2">--%</p>
</div>

<div class="detail-card">
<h3>🌬 Wind</h3>
<p id="wind2">-- m/s</p>
</div>

<div class="detail-card">
<h3>📈 Pressure</h3>
<p id="pressure">-- hPa</p>
</div>

<div class="detail-card">
<h3>👀 Visibility</h3>
<p id="visibility2">-- km</p>
</div>

<div class="detail-card">
<h3>🌍 AQI</h3>
<p id="aqi">Loading...</p>
</div>

</div>

<!-- Tomorrow Forecast -->

<div class="forecast-container">

<div class="card">

<h2>📅 Tomorrow Forecast</h2>

<div id="tomorrowWeather">

Loading...

</div>

</div>

</div>

<!-- 5 Day Forecast -->

<div class="card">

<h2>📆 5-Day Forecast</h2>

<div id="forecastCards">

</div>

</div>

<!-- Temperature Graph -->

<div class="card graph-card">

<h2>📊 7-Day Temperature Graph</h2>

<canvas id="weatherChart"></canvas>

</div>

<footer>

Made with ❤️ by <b>Akshat Kumar Jha</b>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
